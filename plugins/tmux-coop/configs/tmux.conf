set -g mouse on

# 前缀键改为 Ctrl+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Pane 主题
set-option -wg pane-border-status top
set-option -wg pane-border-format "#{?#{==:#{pane_title},Claude},#[fg=colour208 bold],#{?#{==:#{pane_title},Codex},#[fg=colour33 bold],#[default fg=colour39 bold]}} #{pane_title} #[default]"
set-option -wg pane-border-style "fg=colour240"
set-option -wg pane-active-border-style "fg=colour226"
set-option -g allow-rename off
set-option -g automatic-rename off

# 状态栏主题
set-option -g status-style "bg=colour235,fg=colour208"
set-option -g window-status-current-style "fg=colour226,bold"
set-option -g window-status-style "fg=colour240"
set-option -g window-status-format " #I "
set-option -g window-status-current-format " #I "
set-option -g status-left-length 30
set-option -g status-right-length 100
set-option -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}#[fg=colour213]#{=30:pane_current_path} #[fg=cyan]\"#{=30:pane_title}\" #[fg=colour208]%H:%M %d-%b-%y"
